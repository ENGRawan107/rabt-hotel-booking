<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabt | Hotel Booking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">
    <section class="booking-card">

      <div class="brand">
        <div class="logo">R</div>
        <div>
          <h1>Rabt</h1>
          <p>Hotel Booking</p>
        </div>
      </div>

      <h2>Hotel Reservation Form</h2>

      <form id="bookingForm" class="form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your name" />
        </div>

        <div class="form-group">
          <label for="room">Room</label>
          <input type="text" id="room" placeholder="Enter room number" />
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>

        <div class="buttons">
          <button type="submit" class="btn primary">Book</button>
          <button type="button" id="showBookingsBtn" class="btn secondary">
            Show Bookings
          </button>
        </div>
      </form>

      <p id="message" class="message"></p>
      <div id="bookingsList" class="bookings-list"></div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
